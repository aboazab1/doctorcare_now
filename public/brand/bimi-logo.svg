<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ملاحظة: استبدل هذا الشعار بشعارك الرسمي بتنسيق SVG
    متطلبات BIMI:
    - يجب أن يكون الملف بتنسيق SVG فقط
    - يجب أن يكون الشعار بسيط وواضح
    - الحجم الموصى به: 200x200 بكسل (مربع)
    - يجب أن يكون على خلفية شفافة أو بيضاء
    - يجب أن يكون قابل للتكبير (vector)
    
    يمكنك:
    1. تحويل logo.png إلى SVG باستخدام أدوات مثل:
       - https://convertio.co/png-svg/
       - https://www.vectorizer.io/
       - Adobe Illustrator
    2. أو استخدام شعار SVG موجود
  -->
  
  <!-- مثال: شعار دائري مع نص -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- خلفية دائرية -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" stroke="#ffffff" stroke-width="4"/>
  
  <!-- رمز طبي مبسط -->
  <g transform="translate(100, 100)">
    <!-- صليب طبي -->
    <rect x="-30" y="-6" width="60" height="12" fill="#ffffff" rx="6"/>
    <rect x="-6" y="-30" width="12" height="60" fill="#ffffff" rx="6"/>
  </g>
  
  <!-- نص اسم الشركة (اختياري - يمكن حذفه) -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">
    Doctor Care
  </text>
</svg>





